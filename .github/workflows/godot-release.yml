name: Godot release builds

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

env:
  PROJECT_PATH: e-grid-2045
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: stable
  GAME_NAME: "E-Grid 2045"

jobs:
  build:
    name: Build ${{ matrix.label }} release artifact
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            target: linux
            preset: Linux
            artifact: e-grid-2045-linux-x86_64
          - label: Windows
            target: windows
            preset: Windows Desktop
            artifact: e-grid-2045-windows-x86_64
          - label: macOS
            target: macos
            preset: macOS
            artifact: e-grid-2045-macos-universal
          - label: Web
            target: web
            preset: Web
            artifact: e-grid-2045-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync menu version from release tag
        run: python3 .github/scripts/sync-release-version.py "${{ github.ref_name }}"

      - name: Cache Godot editor and export templates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/egrid-godot/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_STATUS }}
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Export ${{ matrix.label }} build
        env:
          PACKAGE_BASENAME: ${{ matrix.artifact }}-${{ github.ref_name }}
        run: bash .github/scripts/export-godot.sh "${{ matrix.preset }}" "${{ matrix.target }}"

      - name: Upload ${{ matrix.label }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and attach builds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -lah dist
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists; replacing build assets."
            gh release upload "${TAG_NAME}" dist/*.zip \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${TAG_NAME}" dist/*.zip \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --generate-notes \
              --title "E-Grid 2045 ${TAG_NAME}"
          fi

  deploy-pages:
    name: Deploy landing and Web build to GitHub Pages
    runs-on: ubuntu-24.04
    needs: release
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FALLBACK_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      HAS_REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for JS web game
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Enable pnpm
        run: corepack enable

      - name: Install JS web game dependencies
        working-directory: web-game
        run: pnpm install --frozen-lockfile

      - name: Build JS web game
        working-directory: web-game
        run: pnpm build

      - name: Download Web build artifact
        uses: actions/download-artifact@v4
        with:
          name: e-grid-2045-web
          path: web-artifact

      - name: Enable GitHub Pages for Actions
        if: ${{ env.HAS_REPO_ADMIN_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if gh api "repos/${GITHUB_REPOSITORY}/pages" --silent >/dev/null 2>&1; then
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/pages" \
              -f build_type=workflow \
              --silent
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/pages" \
              -f build_type=workflow \
              --silent
          fi

      - name: Allow release tags on github-pages environment
        if: ${{ env.HAS_REPO_ADMIN_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          ENVIRONMENT_NAME="github-pages"
          ENVIRONMENT_PATH="repos/${GITHUB_REPOSITORY}/environments/${ENVIRONMENT_NAME}"
          TAG_POLICY="v*"

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "${ENVIRONMENT_PATH}" \
            --input - <<'JSON'
          {
            "deployment_branch_policy": {
              "protected_branches": false,
              "custom_branch_policies": true
            }
          }
          JSON

          policies="$(gh api "${ENVIRONMENT_PATH}/deployment-branch-policies" --paginate)"
          if jq -e --arg name "${TAG_POLICY}" '.branch_policies[]? | select(.name == $name)' <<< "${policies}" >/dev/null; then
            echo "Environment ${ENVIRONMENT_NAME} already allows release tags matching ${TAG_POLICY}."
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "${ENVIRONMENT_PATH}/deployment-branch-policies" \
              --input - <<JSON
          {
            "name": "${TAG_POLICY}",
            "type": "tag"
          }
          JSON
            echo "Environment ${ENVIRONMENT_NAME} now allows release tags matching ${TAG_POLICY}."
          fi

      - name: Validate GitHub Pages setup
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if ! pages_json="$(gh api "repos/${GITHUB_REPOSITORY}/pages" 2>/tmp/pages-error.log)"; then
            {
              echo "## GitHub Pages is not enabled"
              echo
              echo "Enable GitHub Pages once in **Settings → Pages → Build and deployment → Source → GitHub Actions**."
              echo
              echo "For a fully automated tag workflow, add a \`REPO_ADMIN_TOKEN\` repository secret with permission to manage GitHub Pages settings."
              echo
              echo "\`\`\`text"
              cat /tmp/pages-error.log
              echo "\`\`\`"
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::error::GitHub Pages is not enabled for ${GITHUB_REPOSITORY}. Enable Pages with Source = GitHub Actions, or add REPO_ADMIN_TOKEN secret that can manage Pages settings."
            exit 1
          fi

          html_url="$(jq -r '.html_url // empty' <<< "${pages_json}")"
          build_type="$(jq -r '.build_type // empty' <<< "${pages_json}")"
          source_branch="$(jq -r '.source.branch // empty' <<< "${pages_json}")"
          source_path="$(jq -r '.source.path // empty' <<< "${pages_json}")"

          echo "GitHub Pages URL: ${html_url:-unknown}"
          echo "GitHub Pages build type: ${build_type:-unknown}"
          if [[ -n "${source_branch}" ]]; then
            echo "GitHub Pages source branch: ${source_branch}${source_path}"
          fi

          if [[ "${HAS_REPO_ADMIN_TOKEN}" != "true" && "${build_type}" != "workflow" && -n "${source_branch}" ]]; then
            echo "::error::GitHub Pages is configured from branch ${source_branch}${source_path}. Switch Settings → Pages → Source to GitHub Actions, or add REPO_ADMIN_TOKEN so the workflow can set build_type=workflow."
            exit 1
          fi

          environment_json="$(gh api "repos/${GITHUB_REPOSITORY}/environments/github-pages" 2>/tmp/environment-error.log || true)"
          if [[ -n "${environment_json}" && "${GITHUB_REF_TYPE}" == "tag" && "${HAS_REPO_ADMIN_TOKEN}" != "true" ]]; then
            protected_branches="$(jq -r '.deployment_branch_policy.protected_branches // false' <<< "${environment_json}")"
            custom_branch_policies="$(jq -r '.deployment_branch_policy.custom_branch_policies // false' <<< "${environment_json}")"

            if [[ "${protected_branches}" == "true" ]]; then
              echo "::error::The github-pages environment only allows protected branches. Open Settings → Environments → github-pages → Deployment branches and tags, then allow tags matching ${GITHUB_REF_NAME} or add a REPO_ADMIN_TOKEN secret so the workflow can add the v* tag policy."
              exit 1
            fi

            if [[ "${custom_branch_policies}" == "true" ]]; then
              policies="$(gh api "repos/${GITHUB_REPOSITORY}/environments/github-pages/deployment-branch-policies" --paginate)"
              echo "Configured github-pages deployment branch/tag policies:"
              jq -r '.branch_policies[]? | "- " + (.type // "branch-or-tag") + ": " + .name' <<< "${policies}" || true

              if ! jq -e --arg tag "${GITHUB_REF_NAME}" '.branch_policies[]? | select(.name == $tag or .name == "v*" or .name == "*")' <<< "${policies}" >/dev/null; then
                echo "::error::Tag ${GITHUB_REF_NAME} is not allowed by the github-pages environment. Open Settings → Environments → github-pages → Deployment branches and tags, then add a Tag rule named v* or add a REPO_ADMIN_TOKEN secret so the workflow can create it."
                exit 1
              fi
            fi
          fi

      - name: Prepare landing and Web static websites
        run: |
          set -euo pipefail
          SITE_DIR="_site"
          WEB_DIR="${SITE_DIR}/play"
          JS_WEB_DIR="${SITE_DIR}/play-js"
          EDITOR_DIR="${SITE_DIR}/region-editor"
          ROOT_URL="${FALLBACK_PAGES_URL%/}/"
          LANDING_URL="${ROOT_URL}landing/"
          PLAY_JS_URL="${ROOT_URL}play-js/"
          EDITOR_URL="${ROOT_URL}region-editor/"
          PREVIEW_IMAGE_URL="${ROOT_URL}Docs/Concept%20art%20-%20EU-Grid%202026-v2-1.png"

          rm -rf "${SITE_DIR}"
          mkdir -p "${SITE_DIR}/landing"
          cp -R landing/. "${SITE_DIR}/landing/"
          cp "landing/favicon.svg" "${SITE_DIR}/favicon.svg"
          cp "landing/site.webmanifest" "${SITE_DIR}/site.webmanifest"

          mkdir -p "${SITE_DIR}/Docs"
          cp "Docs/menu.png" "${SITE_DIR}/Docs/menu.png"
          cp "Docs/Concept art - EU-Grid 2026-v2-0.png" "${SITE_DIR}/Docs/Concept art - EU-Grid 2026-v2-0.png"
          cp "Docs/Concept art - EU-Grid 2026-v2-1.png" "${SITE_DIR}/Docs/Concept art - EU-Grid 2026-v2-1.png"
          cp "Docs/Concept art - EU-Grid 2026-v2-2.png" "${SITE_DIR}/Docs/Concept art - EU-Grid 2026-v2-2.png"

          mkdir -p "${SITE_DIR}/egrid_region_editor_tool/assets/map"
          cp "egrid_region_editor_tool/assets/map/europe_map_backdrop_generated_clean_v1.png" "${SITE_DIR}/egrid_region_editor_tool/assets/map/europe_map_backdrop_generated_clean_v1.png"

          mkdir -p "${JS_WEB_DIR}"
          cp -R web-game/dist/. "${JS_WEB_DIR}/"
          if [[ ! -f "${JS_WEB_DIR}/index.html" ]]; then
            echo "Missing JS web game index.html after copying web-game/dist" >&2
            exit 1
          fi

          mkdir -p "${EDITOR_DIR}"
          cp "egrid_region_editor_tool/tools/region_editor/region_shape_editor.html" "${EDITOR_DIR}/index.html"
          cp "egrid_region_editor_tool/tools/region_editor/style.css" "${EDITOR_DIR}/style.css"
          cp "egrid_region_editor_tool/tools/region_editor/app.js" "${EDITOR_DIR}/app.js"
          sed -i 's#../../assets/map/europe_map_backdrop_generated_clean_v1.png#../egrid_region_editor_tool/assets/map/europe_map_backdrop_generated_clean_v1.png#g' "${EDITOR_DIR}/index.html"
          if grep -Fq '../../assets/map/europe_map_backdrop_generated_clean_v1.png' "${EDITOR_DIR}/index.html"; then
            echo "Region editor index still references the source-only background path" >&2
            exit 1
          fi

          web_zip="$(find web-artifact -type f -name '*.zip' | sort | head -n 1)"
          if [[ -z "${web_zip}" ]]; then
            echo "No Web artifact zip found in web-artifact" >&2
            exit 1
          fi
          web_zip_name="$(basename "${web_zip}")"
          expected_web_zip="e-grid-2045-web-${GITHUB_REF_NAME}.zip"
          if [[ "${web_zip_name}" != "${expected_web_zip}" ]]; then
            echo "Downloaded Web artifact ${web_zip_name} does not match current release tag ${expected_web_zip}" >&2
            exit 1
          fi

          mkdir -p "${WEB_DIR}"
          unzip -q "${web_zip}" -d "${WEB_DIR}"
          for required_file in index.html index.js index.pck index.wasm; do
            if [[ ! -f "${WEB_DIR}/${required_file}" ]]; then
              echo "Missing expected Web page file after unpacking artifact: ${required_file}" >&2
              exit 1
            fi
          done

          jq -n \
            --arg tag "${GITHUB_REF_NAME}" \
            --arg sha "${GITHUB_SHA}" \
            --arg webArtifact "${web_zip_name}" \
            --arg releaseUrl "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --arg playUrl "${ROOT_URL}play/" \
            --arg playJsUrl "${PLAY_JS_URL}" \
            --arg editorUrl "${EDITOR_URL}" \
            '{
              tag: $tag,
              sha: $sha,
              web_artifact: $webArtifact,
              release_url: $releaseUrl,
              play_url: $playUrl,
              play_js_url: $playJsUrl,
              editor_url: $editorUrl
            }' > "${SITE_DIR}/build-manifest.json"

          cat > "${SITE_DIR}/index.html" <<HTML
          <!doctype html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="theme-color" content="#06131d">
            <meta name="description" content="E-Grid 2045 est un jeu de stratégie énergétique sur la souveraineté IA européenne, jouable sur le web et disponible en builds desktop.">
            <meta http-equiv="refresh" content="0; url=./landing/">
            <link rel="canonical" href="${LANDING_URL}">
            <link rel="icon" href="./favicon.svg" type="image/svg+xml">
            <link rel="manifest" href="./site.webmanifest">
            <meta property="og:type" content="website">
            <meta property="og:locale" content="fr_FR">
            <meta property="og:site_name" content="E-Grid 2045">
            <meta property="og:title" content="E-Grid 2045 — Pilote l’Europe énergétique dans la course à l’AGI">
            <meta property="og:description" content="Prototype hackathon jouable sur le web : énergie, datacenters, refroidissement, compute et souveraineté IA européenne.">
            <meta property="og:url" content="${LANDING_URL}">
            <meta property="og:image" content="${PREVIEW_IMAGE_URL}">
            <meta property="og:image:secure_url" content="${PREVIEW_IMAGE_URL}">
            <meta property="og:image:type" content="image/png">
            <meta property="og:image:alt" content="Carte stratégique E-Grid 2045 montrant le réseau énergétique européen.">
            <meta name="twitter:card" content="summary_large_image">
            <meta name="twitter:title" content="E-Grid 2045 — Pilote l’Europe énergétique">
            <meta name="twitter:description" content="Jeu de stratégie énergétique sur la souveraineté IA européenne, jouable sur le web et disponible en builds desktop.">
            <meta name="twitter:image" content="${PREVIEW_IMAGE_URL}">
            <title>E-Grid 2045 — Hackathon Energie</title>
          </head>
          <body>
            <p>Redirection vers <a href="./landing/">la landing E-Grid 2045</a>. La version JS jouable est disponible sur <a href="./play-js/">/play-js/</a>, le build Web Godot sur <a href="./play/">/play/</a> et le Region Shape Editor sur <a href="./region-editor/">/region-editor/</a>.</p>
          </body>
          </html>
          HTML

          touch "${SITE_DIR}/.nojekyll"
          find "${SITE_DIR}" -maxdepth 3 -type f | sort

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Add website URL to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          WEBSITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          WEBSITE_URL="${WEBSITE_URL:-${FALLBACK_PAGES_URL}}"
          GAME_URL="${WEBSITE_URL%/}/play/"
          JS_GAME_URL="${WEBSITE_URL%/}/play-js/"
          EDITOR_URL="${WEBSITE_URL%/}/region-editor/"
          current_notes="$(gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body // ""')"
          website_line="🌐 Site web : ${WEBSITE_URL}"
          game_line="🎮 Version Web : ${GAME_URL}"
          js_game_line="Version Web JS : ${JS_GAME_URL}"
          editor_line="Region Editor : ${EDITOR_URL}"

          missing_lines=()
          if ! printf '%s' "${current_notes}" | grep -Fq "${website_line}"; then
            missing_lines+=("${website_line}")
          fi
          if ! printf '%s' "${current_notes}" | grep -Fq "${game_line}"; then
            missing_lines+=("${game_line}")
          fi
          if ! printf '%s' "${current_notes}" | grep -Fq "${js_game_line}"; then
            missing_lines+=("${js_game_line}")
          fi
          if ! printf '%s' "${current_notes}" | grep -Fq "${editor_line}"; then
            missing_lines+=("${editor_line}")
          fi

          if [[ "${#missing_lines[@]}" -eq 0 ]]; then
            echo "Release notes already contain the website URLs."
            exit 0
          fi

          {
            printf '%s\n' "${missing_lines[@]}"
            echo
            printf '%s\n' "${current_notes}"
          } > release-notes.md

          gh release edit "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-file release-notes.md

      - name: Update repository website URL
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || github.token }}
          WEBSITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          WEBSITE_URL="${WEBSITE_URL:-${FALLBACK_PAGES_URL}}"

          if gh repo edit "${GITHUB_REPOSITORY}" --homepage "${WEBSITE_URL}"; then
            echo "Repository website URL set to ${WEBSITE_URL}"
          else
            echo "::warning::Unable to update the repository Website field. Add a REPO_ADMIN_TOKEN secret with permission to edit repository metadata, then rerun this tag workflow."
          fi
