<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">E-Grid 2045 icon</title>
  <desc id="desc">Cyan energy grid icon with a stylized E for E-Grid 2045.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="35%" cy="25%" r="75%">
      <stop offset="0" stop-color="#41f3ff" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#06131d"/>
      <stop offset="1" stop-color="#02070d"/>
    </radialGradient>
    <linearGradient id="stroke" x1="80" y1="70" x2="440" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#41f3ff"/>
      <stop offset="0.54" stop-color="#78ffb7"/>
      <stop offset="1" stop-color="#b86cff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.254 0 0 0 0 0.953 0 0 0 0 1 0 0 0 0.8 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="28" y="28" width="456" height="456" rx="104" fill="url(#bgGlow)" stroke="url(#stroke)" stroke-width="10"/>
  <path d="M92 376 L420 376 M92 256 L356 256 M92 136 L420 136" stroke="#41f3ff" stroke-width="12" stroke-linecap="round" opacity="0.18"/>
  <path d="M128 374 V138 H392" fill="none" stroke="url(#stroke)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M128 256 H348" fill="none" stroke="url(#stroke)" stroke-width="44" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M128 374 H392" fill="none" stroke="url(#stroke)" stroke-width="44" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="392" cy="136" r="18" fill="#78ffb7" filter="url(#glow)"/>
  <circle cx="348" cy="256" r="15" fill="#41f3ff" filter="url(#glow)"/>
  <circle cx="392" cy="374" r="18" fill="#b86cff" filter="url(#glow)"/>
</svg>
