name: Label PR version bump

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: label-pr-version-bump-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Classify PR version bump
    if: ${{ github.event.pull_request.state == 'open' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout classifier from base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts/classify-semver-bump.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check base classifier availability
        id: base_classifier
        run: |
          if [[ -f .github/scripts/classify-semver-bump.py ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Bootstrap classifier from this PR
        if: ${{ steps.base_classifier.outputs.available != 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: .github/scripts/classify-semver-bump.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check classifier availability
        id: classifier
        run: |
          if [[ -f .github/scripts/classify-semver-bump.py ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Classifier script is not available yet; skipping label sync for this bootstrap PR."
          fi

      - name: Classify semver bump
        id: classify
        if: ${{ steps.classifier.outputs.available == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SYNC_LABELS: "false"
        run: python3 .github/scripts/classify-semver-bump.py

      - name: Ensure semver labels exist
        if: ${{ steps.classifier.outputs.available == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "semver:major" --color "b60205" --description "Breaking change; next release increments the major version." --force
          gh label create "semver:minor" --color "0e8a16" --description "New feature; next release increments the minor version." --force
          gh label create "semver:patch" --color "1d76db" --description "Fix, maintenance, docs, CI, or polish; next release increments the patch version." --force

      - name: Apply semver label
        if: ${{ steps.classifier.outputs.available == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABEL: ${{ steps.classify.outputs.label }}
        run: |
          set -euo pipefail
          for candidate in "semver:major" "semver:minor" "semver:patch"; do
            if [[ "${candidate}" != "${LABEL}" ]]; then
              gh issue edit "${PR_NUMBER}" --remove-label "${candidate}" || true
            fi
          done
          gh issue edit "${PR_NUMBER}" --add-label "${LABEL}"
