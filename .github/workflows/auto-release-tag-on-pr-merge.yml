name: Auto release tag on PR merge

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: auto-release-tag-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  compute-tag:
    name: Compute next release tag
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      target_ref: ${{ steps.version.outputs.target_ref }}
      bump: ${{ steps.version.outputs.bump }}
    steps:
      - name: Checkout trusted classifier from base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts/classify-semver-bump.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Compute next semver tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          FALLBACK_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          target_sha="${MERGE_COMMIT_SHA}"
          if [[ -z "${target_sha}" || "${target_sha}" == "null" ]]; then
            target_sha="${FALLBACK_SHA}"
          fi
          if [[ -z "${target_sha}" || "${target_sha}" == "null" ]]; then
            echo "::error::Unable to resolve the merged PR commit SHA."
            exit 1
          fi

          labels="$(gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/labels" --jq '.[].name')"
          bump=""
          bump_source=""
          if printf '%s\n' "${labels}" | grep -Fxq 'semver:major'; then
            bump="major"
            bump_source="semver:major label"
          elif printf '%s\n' "${labels}" | grep -Fxq 'semver:minor'; then
            bump="minor"
            bump_source="semver:minor label"
          elif printf '%s\n' "${labels}" | grep -Fxq 'semver:patch'; then
            bump="patch"
            bump_source="semver:patch label"
          else
            echo "No semver label found on PR #${PR_NUMBER}; classifying PR content as fallback."
            semver_output="$(mktemp)"
            GITHUB_TOKEN="${GH_TOKEN}" \
            PR_NUMBER="${PR_NUMBER}" \
            SYNC_LABELS=false \
            SEMVER_OUTPUT_FILE="${semver_output}" \
              python3 .github/scripts/classify-semver-bump.py
            # shellcheck source=/dev/null
            source "${semver_output}"
            bump="${BUMP}"
            bump_source="classifier fallback: ${REASON}"
          fi

          latest_tag="$(
            gh api "repos/${REPOSITORY}/tags" --paginate --jq '.[].name' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1 \
              || true
          )"

          if [[ -z "${latest_tag}" ]]; then
            major=0
            minor=0
            patch=0
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
          fi

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "::error::Unsupported version bump '${bump}'."
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"

          if gh api "repos/${REPOSITORY}/git/ref/tags/${next_tag}" --silent >/dev/null 2>&1; then
            echo "::error::Computed tag ${next_tag} already exists. Re-run the manual release tag workflow with a new tag."
            exit 1
          fi

          echo "tag_name=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "target_ref=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Automatic release tag"
            echo
            echo "- Source PR: #${PR_NUMBER}"
            echo "- Merge commit: \`${target_sha}\`"
            echo "- Previous tag: \`${latest_tag:-none}\`"
            echo "- Version bump: \`${bump}\` (${bump_source})"
            echo "- Next tag: \`${next_tag}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  create-tag:
    name: Create release tag
    needs: compute-tag
    uses: ./.github/workflows/create-release-tag.yml
    with:
      tag_name: ${{ needs.compute-tag.outputs.tag_name }}
      target_ref: ${{ needs.compute-tag.outputs.target_ref }}
    secrets: inherit
