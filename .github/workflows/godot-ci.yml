name: Godot CI

on:
  pull_request:
  push:
    branches:
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PROJECT_PATH: e-grid-2045
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: stable
  GAME_NAME: "E-Grid 2045"

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot editor and export templates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/egrid-godot/4.6.3-stable
            ~/.local/share/godot/export_templates/4.6.3.stable
          key: godot-ubuntu-4.6.3-stable

      - name: Export Linux build
        env:
          PACKAGE_BASENAME: e-grid-2045-linux-x86_64
        run: bash .github/scripts/export-godot.sh "Linux" "linux"

      - name: Run Godot smoke tests
        run: |
          GODOT_BIN="${HOME}/.cache/egrid-godot/${GODOT_VERSION}-${GODOT_STATUS}/godot"
          "${GODOT_BIN}" --headless --path "${PROJECT_PATH}" --script "res://scripts/test/e_grid_gameplay_smoke_test.gd"
          "${GODOT_BIN}" --headless --path "${PROJECT_PATH}" --script "res://scripts/test/e_grid_ui_performance_smoke_test.gd"
          "${GODOT_BIN}" --headless --path "${PROJECT_PATH}" --script "res://scripts/test/e_grid_game_ui_layout_render_test.gd"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: e-grid-2045-linux-x86_64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot editor and export templates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/egrid-godot/4.6.3-stable
            ~/.local/share/godot/export_templates/4.6.3.stable
          key: godot-ubuntu-4.6.3-stable

      - name: Export Windows build
        env:
          PACKAGE_BASENAME: e-grid-2045-windows-x86_64
        run: bash .github/scripts/export-godot.sh "Windows Desktop" "windows"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: e-grid-2045-windows-x86_64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot editor and export templates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/egrid-godot/4.6.3-stable
            ~/.local/share/godot/export_templates/4.6.3.stable
          key: godot-ubuntu-4.6.3-stable

      - name: Export macOS build
        env:
          PACKAGE_BASENAME: e-grid-2045-macos-universal
        run: bash .github/scripts/export-godot.sh "macOS" "macos"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: e-grid-2045-macos-universal
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot editor and export templates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/egrid-godot/4.6.3-stable
            ~/.local/share/godot/export_templates/4.6.3.stable
          key: godot-ubuntu-4.6.3-stable

      - name: Export Web build
        env:
          PACKAGE_BASENAME: e-grid-2045-web
        run: bash .github/scripts/export-godot.sh "Web" "web"

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: e-grid-2045-web
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7
