name: Create release tag

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create. Must start with v, for example v0.1.0"
        required: true
        type: string
      target_ref:
        description: "Branch, tag, or commit SHA to tag"
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  create-tag:
    name: Create tag and trigger release workflows
    runs-on: ubuntu-24.04
    steps:
      - name: Validate release trigger token
        env:
          HAS_RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN != '' }}
          HAS_REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' }}
        run: |
          set -euo pipefail

          if [[ "${HAS_RELEASE_TAG_TOKEN}" != "true" && "${HAS_REPO_ADMIN_TOKEN}" != "true" ]]; then
            {
              echo "## Missing release trigger token"
              echo
              echo "Add a repository secret named \`RELEASE_TAG_TOKEN\` with Contents read/write permission."
              echo "The workflow can also reuse \`REPO_ADMIN_TOKEN\` when that secret already exists."
              echo
              echo "A tag created with the default \`GITHUB_TOKEN\` would not trigger the tag-based release workflows."
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::error::Missing RELEASE_TAG_TOKEN or REPO_ADMIN_TOKEN. A PAT or GitHub App token is required so the created tag triggers release workflows."
            exit 1
          fi

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN || secrets.REPO_ADMIN_TOKEN }}
          TAG_NAME_INPUT: ${{ inputs.tag_name }}
          TARGET_REF: ${{ inputs.target_ref }}
          HAS_RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN != '' }}
        run: |
          set -euo pipefail

          TAG_NAME="${TAG_NAME_INPUT#refs/tags/}"
          if [[ ! "${TAG_NAME}" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "::error::Invalid tag name '${TAG_NAME_INPUT}'. Use a release tag that starts with v, for example v0.1.0 or v2026.06.19."
            exit 1
          fi

          if [[ -z "${TARGET_REF// }" ]]; then
            echo "::error::target_ref cannot be empty. Use main, another branch name, or a commit SHA."
            exit 1
          fi

          encoded_ref="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "${TARGET_REF}")"
          target_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${encoded_ref}" --jq '.sha')"
          if [[ -z "${target_sha}" ]]; then
            echo "::error::Unable to resolve target ref '${TARGET_REF}'."
            exit 1
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG_NAME}" --silent >/dev/null 2>&1; then
            echo "::error::Tag '${TAG_NAME}' already exists. Delete it manually or choose a new release tag."
            exit 1
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG_NAME}" \
            -f sha="${target_sha}" \
            --silent

          token_name="REPO_ADMIN_TOKEN"
          if [[ "${HAS_RELEASE_TAG_TOKEN}" == "true" ]]; then
            token_name="RELEASE_TAG_TOKEN"
          fi

          tag_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"
          actions_url="https://github.com/${GITHUB_REPOSITORY}/actions"
          {
            echo "## Release tag created"
            echo
            echo "- Tag: \`${TAG_NAME}\`"
            echo "- Target ref: \`${TARGET_REF}\`"
            echo "- Target SHA: \`${target_sha}\`"
            echo "- Token secret used: \`${token_name}\`"
            echo
            echo "The tag push should now trigger the tag-based release workflows."
            echo
            echo "Release page: ${tag_url}"
            echo "Actions: ${actions_url}"
          } >> "${GITHUB_STEP_SUMMARY}"
